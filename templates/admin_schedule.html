{% extends "base.html" %}

{% block content %}

<div class="page-container">

<!-- ✅ SCHEDULE CLASS -->
<div class="form-card">

    <h3>📅 Schedule Class</h3>

    <div class="form-grid">

        <select id="scheduleStudent" onchange="loadSubjectsFromStudent()"></select>

        <select id="scheduleSubject" onchange="filterTeachersBySubject()"></select>

        <select id="scheduleTeacher"></select>

       <div class="time-range">

           <div>
               <label>Start Time</label>
               <input type="time" id="startTime">
           </div>

           <div>
               <label>End Time</label>
               <input type="time" id="endTime">
           </div>

        </div>

    </div>

    <br>

    <!-- ✅ DAYS -->
    <div class="days-row">

        <label><input type="checkbox" class="day-checkbox" value="Monday"> Mon</label>
        <label><input type="checkbox" class="day-checkbox" value="Tuesday"> Tue</label>
        <label><input type="checkbox" class="day-checkbox" value="Wednesday"> Wed</label>
        <label><input type="checkbox" class="day-checkbox" value="Thursday"> Thu</label>
        <label><input type="checkbox" class="day-checkbox" value="Friday"> Fri</label>
        <label><input type="checkbox" class="day-checkbox" value="Saturday"> Sat</label>
        <label><input type="checkbox" class="day-checkbox" value="Sunday"> Sun</label>

    </div>

    <br>

    <div class="recurring-row">
        <label class="recurring-label">
            <input type="checkbox" id="isRecurring" checked>
            <span>Recurring</span>
        </label>
    </div>
    <div class="recurring-row">
        <label>
            <input type="checkbox" id="isOnlineClass" checked>
            <span>📡 Online Class (Zoom)</span>
        </label>
    </div>

    <div id="startDateDisplay" style="margin-top:8px; color:#007bff; font-weight:bold;"></div>


    <button onclick="createSchedule()">Create Schedule</button>

</div>

<!-- ✅ SCHEDULED CLASSES -->
<div class="form-card">

    <h3>📋 Scheduled Classes</h3>

    <div style="margin-bottom: 10px; display: flex; gap: 10px;">

        <input type="month" id="monthFilter" onchange="loadClasses()">

        <input type="text" id="studentSearch" placeholder="Search student..." onkeyup="loadClasses()">

    </div>

    <table>
        <thead>
            <tr>
                <th>Student</th>
                <th>Subject</th>
                <th>Teacher</th>
                <th>Date</th>
                <th>Time</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="class-list"></tbody>
    </table>

</div>

</div>

<!-- ✅ EDIT MODAL -->
<div id="editModal" class="modal">

    <h4>✏️ Edit Class</h4>

    <div class="form-group">
        <label>Date:</label>
        <input type="date" id="editDate">
    </div>

    <div class="form-group">
        <label>Time:</label>

        <div class="time-range">
            <div>
                <input type="time" id="editStartTime">
            </div>

            <div>
                <input type="time" id="editEndTime">
            </div>
        </div>

    </div>

    <div class="form-group">
        <label>Teacher:</label>
        <select id="editTeacher"></select>
    </div>

    <div class="form-group">
        <label>Subject:</label>
        <select id="editSubject"></select>
    </div>

    <div class="modal-actions">
        <button onclick="saveEdit()">Save</button>
        <button onclick="closeEdit()">Cancel</button>
    </div>

</div>
<script>
window.onload = function() {
    loadClasses();   // ✅ correct
};
</script>

{% endblock %}
